<!DOCTYPE html>
<html>
<head>
<title>Fake News Detection</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="main">

<div class="card">

<h1>📰 Fake News Detection System</h1>
<p class="subtitle">Paste a news article and check whether it is real or fake</p>

<form action="/predict" method="post">

<textarea name="news" placeholder="Paste news text here..."></textarea>

<button type="submit">Check News</button>

</form>

{% if prediction %}

<div class="result">
Result: <span>{{ prediction }}</span>
</div>

{% endif %}

</div>

</div>

</body>
</html>
