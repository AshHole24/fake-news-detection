<!DOCTYPE html>
<html>
<head>
<title>Fake News Detector</title>
<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="main-container">

<!-- LEFT SIDE -->
<div class="left-panel">

<h2>Fake News Detection</h2>

<form action="/predict" method="post">
<textarea name="news" placeholder="Enter news here..."></textarea>
<button type="submit">Analyze News</button>
</form>

{% if error %}
<p style="color:red;">{{error}}</p>
{% endif %}

{% if prediction %}
<div class="result">
<h3>{{prediction}}</h3>
<p>Confidence: {{confidence}}%</p>
</div>
{% endif %}

{% if reasons %}
<div class="result">
<strong>Reason:</strong>
<ul>
{% for r in reasons %}
<li>{{r}}</li>
{% endfor %}
</ul>
</div>
{% endif %}

</div>

<!-- RIGHT SIDE -->
<div class="right-panel">

<!-- Confidence Bar -->
{% if confidence %}
<div class="bar-container">
<div class="bar" style="width: {{confidence}}%;">
{{confidence}}%
</div>
</div>
{% endif %}

<!-- Pie Chart -->
<canvas id="chart"></canvas>

</div>

</div>

<!-- BOTTOM BUTTONS -->
<div class="bottom-buttons">
<a href="/latest" class="news-btn">Latest News</a>
<a href="/history" class="news-btn">History</a>
</div>

<!-- Chart -->
<script>
var ctx = document.getElementById('chart');

if(ctx){
new Chart(ctx,{
    type:'pie',
    data:{
        labels:['Fake','Real'],
        datasets:[{
            data:[{{fake}},{{real}}],
            backgroundColor:['#ef4444','#22c55e']
        }]
    }
});
}
</script>

</body>
</html>
