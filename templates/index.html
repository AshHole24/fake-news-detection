<!DOCTYPE html>
<html>
<head>
<title>Fake News Detector</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

<div class="card gradient-card">

<h2>Fake News Detection</h2>

<form action="/predict" method="post">
<textarea name="news" placeholder="Enter news here..."></textarea>
<button type="submit">Analyze News</button>
</form>

{% if error %}
<p style="color:red;">{{error}}</p>
{% endif %}

{% if prediction %}
<div class="result">
<h3>{{prediction}}</h3>
<p>Confidence: {{confidence}}%</p>

<!-- Confidence Bar -->
<div style="background:#ddd;border-radius:10px;">
<div style="
width: {{confidence}}%;
background: linear-gradient(90deg,#22c55e,#16a34a);
padding:8px;
border-radius:10px;
color:white;
text-align:center;
">
{{confidence}}%
</div>
</div>
</div>
{% endif %}

{% if reasons %}
<div class="result">
<strong>Reason:</strong>
<ul>
{% for r in reasons %}
<li>{{r}}</li>
{% endfor %}
</ul>
</div>
{% endif %}

<br>

<a href="/latest" class="news-btn">Latest News</a>
<a href="/history" class="news-btn">View History</a>

</div>

</div>

</body>
</html>
