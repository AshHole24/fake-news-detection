<!DOCTYPE html>
<html>

<head>

<title>News Detail</title>

<link rel="stylesheet" href="/static/style.css">

</head>

<body>

<header class="latest-header">

<h1>{{article.title}}</h1>

</header>

<div class="article-container">

<p>{{article.content if article.content else article.description}}</p>

<br>

<p style="font-size:13px;color:gray;">
Source: {{article.source.name}} |
Date: {{article.publishedAt[:10]}}
</p>

<br>

<a href="{{article.url}}" target="_blank" class="news-btn">
Read Full Article
</a>

<hr>

<h3>Ask About This News</h3>

<form id="chatForm">
<input type="text" id="query" placeholder="Ask something..." style="width:70%;padding:8px;">
<button type="submit">Ask</button>
</form>

<p id="response" style="margin-top:10px;"></p>

</div>

<div class="back-container">

<a class="news-btn" href="/latest">⬅ Back to News</a>

</div>
<script>

document.getElementById("chatForm").addEventListener("submit", async function(e){
    e.preventDefault();

    let queryInput = document.getElementById("query");
    let responseBox = document.getElementById("response");

    let query = queryInput.value.trim();

    // ✅ prevent empty input
    if(query === ""){
        responseBox.innerText = "Please enter a question.";
        return;
    }

    try{
        let res = await fetch("/chat", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded"
            },
            body: "query=" + encodeURIComponent(query)
        });

        let data = await res.text();

        responseBox.innerText = data;

    } catch(error){
        responseBox.innerText = "Something went wrong. Please try again.";
        console.error(error);
    }

    // ✅ optional: clear input after submit
    queryInput.value = "";

});

</script>

</body>
</html>
