<!DOCTYPE html>
<html>
<head>
<title>News Detail</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<!-- TOP BACK BUTTON -->
<div class="top-bar">
<a href="/latest" class="news-btn">⬅ Back</a>
</div>

<div class="container">

<div class="article-card">

<h2>{{article.title}}</h2>

<p class="meta">
{{article.source.name}} • {{article.publishedAt[:10]}}
</p>

<p class="content">
{{article.content if article.content else article.description}}
</p>

<a href="{{article.url}}" target="_blank" class="news-btn">
Read Full Article
</a>

<hr>

<h3>Ask AI</h3>

<form id="chatForm" class="chat-box">
<input type="text" id="query" placeholder="Ask about this news...">
<button type="submit">Ask</button>
</form>

<p id="response"></p>

</div>

</div>

<script>
document.getElementById("chatForm").addEventListener("submit", async function(e){
    e.preventDefault();

    let query = document.getElementById("query").value.trim();
    let responseBox = document.getElementById("response");

    if(query === ""){
        responseBox.innerText = "Enter a question";
        return;
    }

    responseBox.innerText = "Thinking...";

    let res = await fetch("/chat", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: "query=" + encodeURIComponent(query)
    });

    let data = await res.text();
    responseBox.innerText = data;
});
</script>

</body>
</html>
